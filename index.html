<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İhale Hesaplayıcı - Geniş Buton Modu</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100vw;
            height: 100vh;
            background: #1e1e1e;
            padding: 6px 14px;
            display: flex;
            flex-direction: column;
        }
        h2 {
            color: #ff9800;
            margin: 4px 0 8px 0;
            font-size: 22px;
            text-align: center;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 6px;
        }
        input {
            flex: 1;
            padding: 12px 6px;
            font-size: 26px;
            border: 2px solid #ff9800;
            border-radius: 8px;
            background-color: #2b2b2b;
            color: white;
            text-align: center;
            font-weight: 900;
        }
        input:focus {
            outline: none;
            border-color: #4caf50;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.6);
        }
        .clear-btn {
            padding: 0 28px;
            font-size: 26px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 900;
        }
        .progress-container {
            background-color: #333;
            border-radius: 3px;
            height: 6px;
            width: 100%;
            margin-bottom: 10px;
            display: none;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f44336, #ff9800, #4caf50);
        }
        
        .header-row {
            display: flex;
            background-color: #ff9800;
            color: black;
            font-weight: 900;
            font-size: 16px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 6px; /* Satırların kendi arasındaki boşluğu artırdık */
        }
        .row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid #333;
            width: 100%;
            height: 54px; /* Satır yüksekliğini artırarak basma alanını genişlettik */
        }
        .col-left {
            width: 25%;
            font-weight: 900;
            font-size: 18px;
            text-align: left;
            padding-left: 4px;
        }
        .col-center {
            width: 50%;
            font-weight: 900;
            text-align: center; /* Sayıları tam ortaya hizaladık */
            font-size: 28px;
            line-height: 1;
        }
        .col-right-btn {
            width: 25%; /* Buton alanını genişlettik */
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .copy-btn {
            background-color: #333;
            color: #fff;
            border: 2px solid #ff9800;
            border-radius: 8px;
            width: 100%;
            height: 44px; /* Butonun dikey yüksekliğini artırdık */
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
        }
        .copy-btn:active {
            background-color: #ff9800;
            color: black;
            transform: scale(0.95);
        }

        #p85 { color: #ffd700; }
        #p70 { color: #c0c0c0; }
        #p55 { color: #cd7f32; }
        #p40 { color: #ffff00; }
        #p30 { color: #ff3333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Parapania İhale Hesapla</h2>
    
    <div class="input-group">
        <input type="text" id="budget" placeholder="Bütçe" inputmode="decimal" pattern="[0-9]*" autofocus oninput="formatGirdiVeHesapla(this)">
        <button class="clear-btn" onclick="temizle()">X</button>
    </div>

    <div class="progress-container" id="barContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="header-row">
        <div style="width: 25%; text-align: left; padding-left: 4px;">Hedef</div>
        <div style="width: 50%; text-align: center;">Teklif Tutarı</div>
        <div style="width: 25%; text-align: center;">Kopyala</div>
    </div>

    <div class="results-list">
        <div class="row">
            <div class="col-left">🏆 %85</div>
            <div class="col-center" id="p85">0,00 ₺</div>
            <div class="col-right-btn"><button class="copy-btn" onclick="kopyalaTamKisim(85, this)">📋 Kopyala</button></div>
        </div>
        <div class="row">
            <div class="col-left">🥈 %70</div>
            <div class="col-center" id="p70">0,00 ₺</div>
            <div class="col-right-btn"><button class="copy-btn" onclick="kopyalaTamKisim(70, this)">📋 Kopyala</button></div>
        </div>
        <div class="row">
            <div class="col-left">🥉 %55</div>
            <div class="col-center" id="p55">0,00 ₺</div>
            <div class="col-right-btn"><button class="copy-btn" onclick="kopyalaTamKisim(55, this)">📋 Kopyala</button></div>
        </div>
        <div class="row">
            <div class="col-left">⏳ %40</div>
            <div class="col-center" id="p40">0,00 ₺</div>
            <div class="col-right-btn"><button class="copy-btn" onclick="kopyalaTamKisim(40, this)">📋 Kopyala</button></div>
        </div>
        <div class="row">
            <div class="col-left">💤 %30</div>
            <div class="col-center" id="p30">0,00 ₺</div>
            <div class="col-right-btn"><button class="copy-btn" onclick="kopyalaTamKisim(30, this)">📋 Kopyala</button></div>
        </div>
    </div>
</div>

<script>
    let hamSonuclar = { 85: 0, 70: 0, 55: 0, 40: 0, 30: 0 };

    function klavyeyiZorla() {
        const budgetInput = document.getElementById('budget');
        budgetInput.blur();
        setTimeout(() => {
            budgetInput.focus();
            if(navigator.virtualKeyboard) {
                navigator.virtualKeyboard.show();
            }
        }, 50);
    }

    window.addEventListener('DOMContentLoaded', klavyeyiZorla);
    window.addEventListener('load', klavyeyiZorla);

    function formatMoney(value) {
        return value.toLocaleString('tr-TR', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }) + " ₺";
    }

    function formatGirdiVeHesapla(input) {
        let temizVeri = input.value.replace(/[^0-9.,]/g, '');
        temizVeri = temizVeri.replace(/,/g, '.');
        let parcalar = temizVeri.split('.');
        
        parcalar[0] = parcalar[0].replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        
        if (parcalar[1] !== undefined) {
            parcalar[1] = parcalar[1].substring(0, 2);
            input.value = parcalar[0] + "," + parcalar[1];
        } else {
            input.value = parcalar[0];
        }

        let hesaplanacakSayi = parseFloat(temizVeri);
        let barContainer = document.getElementById('barContainer');
        let progressBar = document.getElementById('progressBar');

        if (isNaN(hesaplanacakSayi) || hesaplanacakSayi <= 0) {
            barContainer.style.display = "none";
            progressBar.style.width = "0%";
            sifirlaTablo();
            return;
        }

        barContainer.style.display = "block";
        progressBar.style.width = "100%";

        const percentages = [85, 70, 55, 40, 30];
        percentages.forEach(p => {
            let sonuc = (hesaplanacakSayi * p) / 100;
            hamSonuclar[p] = sonuc;
            document.getElementById('p' + p).innerText = formatMoney(sonuc);
        });
    }

    function kopyalaTamKisim(yuzde, buton) {
        let deger = hamSonuclar[yuzde];
        if (!deger || deger <= 0) return;

        let tamKisim = Math.floor(deger).toString();

        navigator.clipboard.writeText(tamKisim).then(() => {
            let eskiMetin = buton.innerHTML;
            buton.innerHTML = "✔️ Kopyalandı";
            buton.style.borderColor = "#4caf50";
            buton.style.color = "#4caf50";
            
            setTimeout(() => {
                buton.innerHTML = eskiMetin;
                buton.style.borderColor = "#ff9800";
                buton.style.color = "#fff";
                document.getElementById('budget').focus();
            }, 800);
        }).catch(err => {
            console.log("Kopyalama başarısız: ", err);
        });
    }

    function temizle() {
        const budgetInput = document.getElementById('budget');
        budgetInput.value = "";
        document.getElementById('barContainer').style.display = "none";
        document.getElementById('progressBar').style.width = "0%";
        sifirlaTablo();
        budgetInput.focus();
    }

    function sifirlaTablo() {
        const percentages = [85, 70, 55, 40, 30];
        percentages.forEach(p => {
            hamSonuclar[p] = 0;
            document.getElementById('p' + p).innerText = "0,00 ₺";
        });
    }
</script>

</body>
</html>
